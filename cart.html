<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kundvagn</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav>
        <a href="index.html">Hem</a>
        <a href="cats.html">Katter</a>
        <a href="owner.html">Om oss</a>
        <a href="cart.html">Kundvagn</a>
    </nav>

    <main>
        <h1>Kundvagn</h1>
        
        <section class="cart-layout">
            <div id="cart-container"></div>

            <form id="checkout-form">
                <h2>Checkout</h2>

                <input
                    type="text"
                    id="name"
                    placeholder="Namn"
                    required
                >

                <input
                    type="email"
                    id="email"
                    placeholder="E-post"
                    required
                >

                <input
                    type="text"
                    id="address"
                    placeholder="Adress"
                    required
                >

                <button type="submit">
                    Slutför köp
                </button>
            </form>
        </section>
    </main>

    <script src="cart.js"></script>

</body>
</html>
